# sync-docs.yml
# Azure DevOps pipeline — syncs doc templates from docs-platform weekly.
# Add this file to: .azure/pipelines/sync-docs.yml in each consuming repo.
#
# Prerequisites:
#   - Set pipeline variable DOCS_PLATFORM_REPO with your docs-platform GitHub URL
#   - Grant the build service permission to push branches and create PRs

trigger: none

schedules:
  - cron: "0 8 * * 1"           # every Monday at 08:00 UTC
    displayName: Weekly doc template sync
    branches:
      include:
        - main
    always: false                # skip if no changes in docs-platform

pool:
  vmImage: ubuntu-latest

variables:
  DOCS_PLATFORM_REPO: "https://github.com/yourorg/docs-platform"
  DOCS_PLATFORM_REF: "main"
  BRANCH_NAME: "docs/template-sync-$(Build.BuildId)"

steps:
  - checkout: self
    persistCredentials: true
    fetchDepth: 0

  - script: |
      git config user.email "pipeline@yourorg.com"
      git config user.name "Docs Sync Pipeline"
    displayName: Configure git identity

  - script: |
      export DOCS_PLATFORM_REPO=$(DOCS_PLATFORM_REPO)
      export DOCS_PLATFORM_REF=$(DOCS_PLATFORM_REF)
      bash scripts/sync-docs.sh
    displayName: Run sync-docs.sh
    env:
      DOCS_PLATFORM_REPO: $(DOCS_PLATFORM_REPO)
      DOCS_PLATFORM_REF: $(DOCS_PLATFORM_REF)

  - script: |
      # Check if anything changed
      if git diff --quiet; then
        echo "No changes — already up to date."
        echo "##vso[task.setvariable variable=HAS_CHANGES]false"
      else
        echo "Changes detected."
        echo "##vso[task.setvariable variable=HAS_CHANGES]true"
      fi
    displayName: Check for changes

  - script: |
      git checkout -b $(BRANCH_NAME)
      git add docs/templates/ docs/STYLE.md .markdownlint.json docs/.platform-version
      git commit -m "chore: sync doc templates from docs-platform"
      git push origin $(BRANCH_NAME)
    displayName: Push branch
    condition: eq(variables['HAS_CHANGES'], 'true')

  - task: CreatePullRequest@1
    displayName: Create pull request
    condition: eq(variables['HAS_CHANGES'], 'true')
    inputs:
      repoType: Azure DevOps
      sourceBranch: $(BRANCH_NAME)
      targetBranch: main
      title: "chore: sync doc templates from docs-platform"
      description: |
        Automated sync of shared documentation templates from docs-platform.

        **What changed:** templates in `docs/templates/`, `docs/STYLE.md`, `.markdownlint.json`
        **What was NOT touched:** your ADRs, RFCs, design docs, glossary, AGENTS.md

        Review the diff before merging. If a template section was added or renamed,
        consider updating your existing docs to match.
      autoComplete: false
      reviewers: ""
